name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Organize Web Files for Capacitor
      run: |
        mkdir -p dist
        # Agar index.html root me hai, toh use dist folder me move karein
        if [ -f "index.html" ]; then
          mv index.html dist/ 2>/dev/null || true
        fi
        # Baki ki assets/folders ko bhi dist me daal dein (bina config/node_modules ke)
        find . -maxdepth 1 -not -name '.' -not -name '..' -not -name 'dist' -not -name '.github' -not -name 'node_modules' -not -name 'package.json' -not -name 'capacitor.config.json' -not -name 'package-lock.json' -exec mv {} dist/ \; 2>/dev/null || true

    - name: Add Android Platform
      run: |
        npx cap add android || true

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
